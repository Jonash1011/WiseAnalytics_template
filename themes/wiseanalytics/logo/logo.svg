<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none" role="img" aria-label="WiseAnalytics">
  <!-- Chart icon mark: three rising bars + upward arrow -->
  <g>
    <!-- Bar 1 (short) -->
    <rect x="2" y="32" width="8" height="14" rx="2" fill="#8700DA"/>
    <!-- Bar 2 (medium) -->
    <rect x="14" y="22" width="8" height="24" rx="2" fill="#162FCC"/>
    <!-- Bar 3 (tall) -->
    <rect x="26" y="12" width="8" height="34" rx="2" fill="#8700DA"/>
    <!-- Trend line -->
    <polyline points="6,33 18,23 30,13" stroke="#8700DA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
    <!-- Arrow head -->
    <polyline points="25,10 30,13 27,18" stroke="#8700DA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
  </g>

  <!-- Wordmark: "Wise" in extrabold purple, "Analytics" in regular blue -->
  <!-- "Wise" -->
  <text
    x="44"
    y="34"
    font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="26"
    font-weight="800"
    fill="#8700DA"
    letter-spacing="-0.5"
  >Wise</text>
  <!-- "Analytics" -->
  <text
    x="108"
    y="34"
    font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#162FCC"
    letter-spacing="-0.3"
  >Analytics</text>
</svg>
