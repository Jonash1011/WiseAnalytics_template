<!-- ┌─────────────────────────────────────────────────────────┐
     │  STANDARD FOOTER (light slides — white/grey bg)        │
     └─────────────────────────────────────────────────────────┘ -->
<div class="wa-slide-footer">

    <!-- LEFT: Logo + website -->
    <div class="wa-slide-footer__left">
        <img
            class="wa-slide-footer__logo"
            src="logo.png"
            alt="WiseAnalytics"
            draggable="false"
        >
        <span class="wa-slide-footer__url">Wiseanalytics.com</span>
    </div>

    <!-- RIGHT: Copyright -->
    <div class="wa-slide-footer__right">
        <span class="wa-slide-footer__copyright">Copyright &copy; 2025 Wiseanalytics.</span>
    </div>

</div>
